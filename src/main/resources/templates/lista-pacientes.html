<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Lista de Pacientes</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <nav xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
      <ul>
        <li sec:authorize="hasAnyRole('ADMIN', 'VETERINARIO')">
          <a th:href="@{/pacientes/lista}">Pacientes</a>
        </li>

        <li><a th:href="@{/citas/lista}">Citas Médicas</a></li>

        <li sec:authorize="hasAnyRole('ADMIN', 'VETERINARIO')">
          <a th:href="@{/fichas/historial}">Historial Clínico</a>
        </li>

        <li class="logout-btn">
          <form th:action="@{/logout}" method="post" style="display: inline">
            <button type="submit">Cerrar Sesión</button>
          </form>
        </li>
      </ul>
    </nav>
    <div class="container" style="max-width: 900px">
      <h1>Pacientes Registrados</h1>
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Especie</th>
            <th>Raza</th>
            <th>Edad</th>
            <th>Dueño</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${lista}">
            <td th:text="${p.nombre}"></td>
            <td th:text="${p.especie}"></td>
            <td th:text="${p.raza}"></td>
            <td th:text="${p.edad}"></td>
            <td th:text="${p.nombreDueno}"></td>
          </tr>
        </tbody>
      </table>
      <br />
      <a th:href="@{/pacientes/registro}" class="button"
        >Registrar Nuevo Paciente</a
      >
    </div>
  </body>
</html>
