<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Registro de Pacientes</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <nav>
      <ul>
        <li><a th:href="@{/pacientes/lista}">Pacientes</a></li>
        <li><a th:href="@{/citas/lista}">Citas Médicas</a></li>
        <li class="logout-btn">
          <form th:action="@{/logout}" method="post">
            <button type="submit">Cerrar Sesión</button>
          </form>
        </li>
      </ul>
    </nav>

    <div class="container">
      <h1>Registrar Nuevo Paciente</h1>
      <form
        th:action="@{/pacientes/guardar}"
        th:object="${paciente}"
        method="post"
      >
        <label>Nombre Mascota:</label>
        <input type="text" th:field="*{nombre}" required />

        <label>Especie:</label>
        <input
          type="text"
          th:field="*{especie}"
          placeholder="Ej: Perro"
          required
        />

        <label>Raza:</label>
        <input type="text" th:field="*{raza}" required />

        <label>Edad:</label>
        <input type="number" th:field="*{edad}" required />

        <label>Nombre del Dueño:</label>
        <input type="text" th:field="*{nombreDueno}" required />

        <button type="submit">Guardar Paciente</button>
      </form>
    </div>
  </body>
</html>
